<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIT YOU UP ACADEMY — Learning Check</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- docx.js for Word export -->
<script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
<style>
:root {
  --bg:#0d0d0d; --surface:#161616; --card:#1c1c1c; --border:#2e2e2e;
  --accent:#f5e642; --red:#ff4d4d; --green:#3ddc84; --orange:#ff9500;
  --text:#f0f0f0; --muted:#666;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}

/* ── HEADER ── */
.site-header{background:var(--accent);padding:0 40px;display:flex;align-items:stretch;justify-content:space-between;border-bottom:4px solid #000;}
.logo-block{display:flex;flex-direction:column;justify-content:center;padding:20px 0;}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:54px;letter-spacing:5px;color:#000;line-height:1;}
.logo-sub{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:6px;color:#000;opacity:.55;margin-top:5px;}
.header-right{align-self:center;display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.header-badge{background:#000;color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:3px;padding:9px 22px;}

/* ── SECTION ── */
.wrap{max-width:1120px;margin:0 auto;padding:0 32px;}

/* ── TOOLBAR ── */
.toolbar{margin-top:22px;background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--green);padding:14px 22px;display:flex;align-items:center;flex-wrap:wrap;gap:10px;}
.toolbar-label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--green);white-space:nowrap;}
#recSelect{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;padding:8px 12px;outline:none;min-width:180px;max-width:300px;flex:1;cursor:pointer;}
#recSelect:focus{border-color:var(--accent);}
.save-msg{font-family:'Space Mono',monospace;font-size:11px;color:var(--green);opacity:0;transition:opacity .4s, color .3s;white-space:nowrap;margin-left:4px;}

/* ── INFO BLOCK ── */
.info-block{margin-top:22px;background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--accent);padding:26px 30px;}
.block-title{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:4px;color:var(--accent);margin-bottom:18px;text-transform:uppercase;}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:18px 30px;}
.ifield{display:flex;flex-direction:column;gap:5px;}
.ifield label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.ifield input{background:transparent;border:none;border-bottom:1px solid var(--border);padding:6px 0;font-family:'Noto Sans KR',sans-serif;font-size:15px;color:var(--text);outline:none;width:100%;transition:border-color .2s;}
.ifield input:focus{border-bottom-color:var(--accent);}
.span2{grid-column:span 2;}

/* ── ADD ZONE ── */
.add-zone{margin-top:22px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.add-zone .zone-label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--muted);white-space:nowrap;}
.add-zone input{background:var(--surface);border:1px solid var(--border);padding:10px 14px;font-family:'Noto Sans KR',sans-serif;font-size:14px;color:var(--text);outline:none;width:170px;transition:border-color .2s;}
.add-zone input:focus{border-color:var(--accent);}

/* ── BUTTONS ── */
.btn{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.8px;padding:9px 16px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn-y{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.btn-y:hover{background:#dfd020;border-color:#dfd020;color:#000;}
.btn-g{border-color:var(--green);color:var(--green);}
.btn-g:hover{background:var(--green);color:#000;}
.btn-r{border-color:var(--red);color:var(--red);}
.btn-r:hover{background:var(--red);color:#fff;}
.btn-o{border-color:var(--orange);color:var(--orange);}
.btn-o:hover{background:var(--orange);color:#000;}
.btn-d{border-color:#3a3a3a;color:#666;}
.btn-d:hover{border-color:var(--text);color:var(--text);}
.btn-b{border-color:#4a90d9;color:#4a90d9;}
.btn-b:hover{background:#4a90d9;color:#fff;}
.btn-gmail{border-color:#ea4335;color:#ea4335;}
.btn-gmail:hover{background:#ea4335;color:#fff;}

/* ── STUDENT GRID ── */
.student-grid{margin-top:22px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;}
.empty-note{grid-column:1/-1;text-align:center;padding:56px 20px;color:var(--muted);font-family:'Space Mono',monospace;font-size:12px;letter-spacing:2px;border:1px dashed var(--border);}

/* ── CARD ── */
.s-card{background:var(--card);border:1px solid var(--border);overflow:hidden;animation:up .28s ease both;}
@keyframes up{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.c-head{display:flex;align-items:center;padding:13px 17px 11px;background:var(--surface);border-bottom:1px solid var(--border);}
.c-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--accent);opacity:.4;line-height:1;margin-right:12px;}
.c-name{font-size:17px;font-weight:700;flex:1;}
.c-del{background:transparent;border:1px solid #3a3a3a;color:var(--muted);width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;transition:all .15s;padding:0;}
.c-del:hover{border-color:var(--red);color:var(--red);}
.c-body{padding:15px 17px 17px;display:flex;flex-direction:column;gap:13px;}
.c-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.c-label{font-size:13px;color:#aaa;flex:1;}

/* attendance */
.att-g{display:flex;gap:3px;}
.att-g input[type=radio]{display:none;}
.att-g label{font-family:'Space Mono',monospace;font-size:11px;padding:5px 9px;border:1px solid var(--border);cursor:pointer;color:var(--muted);transition:all .15s;}
.att-g label:hover{border-color:var(--text);color:var(--text);}
.att-g input[value="O"]:checked+label{background:var(--green);border-color:var(--green);color:#000;font-weight:700;}
.att-g input[value="X"]:checked+label{background:var(--red);border-color:var(--red);color:#fff;font-weight:700;}
.att-g input[value="L"]:checked+label{background:var(--orange);border-color:var(--orange);color:#000;font-weight:700;}

/* toggle */
.tog{display:flex;}
.tog input[type=checkbox]{display:none;}
.tog label{position:relative;width:44px;height:24px;background:var(--border);cursor:pointer;border-radius:12px;display:block;transition:background .2s;}
.tog label::after{content:'';position:absolute;width:18px;height:18px;background:var(--muted);border-radius:50%;top:3px;left:3px;transition:all .2s;}
.tog input:checked+label{background:var(--green);}
.tog input:checked+label::after{left:23px;background:#fff;}

/* stars */
.stars{display:flex;gap:2px;}
.stars input[type=radio]{display:none;}
.stars label{font-size:21px;cursor:pointer;color:#2e2e2e;line-height:1;transition:color .1s;}
.stars label:hover{color:var(--accent);}
/* fill stars up to selected */
.stars.r1 label:nth-child(2){color:var(--accent);}
.stars.r2 label:nth-child(2),.stars.r2 label:nth-child(4){color:var(--accent);}
.stars.r3 label:nth-child(2),.stars.r3 label:nth-child(4),.stars.r3 label:nth-child(6){color:var(--accent);}
.stars.r4 label:nth-child(2),.stars.r4 label:nth-child(4),.stars.r4 label:nth-child(6),.stars.r4 label:nth-child(8){color:var(--accent);}
.stars.r5 label:nth-child(n+2){color:var(--accent);}

/* memo */
.memo-row{display:flex;flex-direction:column;gap:5px;}
.memo-row label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--muted);}
.memo-row textarea{background:var(--bg);border:1px solid var(--border);padding:8px 10px;font-family:'Noto Sans KR',sans-serif;font-size:13px;color:var(--text);outline:none;resize:none;height:54px;width:100%;line-height:1.5;transition:border-color .2s;}
.memo-row textarea:focus{border-color:var(--accent);}

/* parent section */
.parent-section{border-top:1px solid var(--border);margin-top:4px;padding-top:12px;}
.parent-header{display:flex;align-items:center;gap:8px;}
.parent-icon{font-size:16px;}
.parent-title{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;color:#f5e642;flex:1;}
.parent-toggle{background:transparent;border:1px solid #3a3a3a;color:var(--muted);font-family:'Space Mono',monospace;font-size:10px;padding:4px 10px;cursor:pointer;transition:all .15s;}
.parent-toggle:hover{border-color:var(--accent);color:var(--accent);}
.parent-body{margin-top:12px;display:flex;flex-direction:column;gap:10px;}
.parent-body textarea{background:var(--bg);border:1px solid #f5e64240;padding:10px 12px;font-family:'Noto Sans KR',sans-serif;font-size:13px;color:var(--text);outline:none;resize:vertical;height:120px;width:100%;line-height:1.8;transition:border-color .2s;border-radius:0;}
.parent-body textarea:focus{border-color:var(--accent);}
.parent-actions{display:flex;flex-wrap:wrap;gap:6px;}
.btn-ptag{background:transparent;border:1px solid #3a3a3a;color:#aaa;font-family:'Noto Sans KR',sans-serif;font-size:11px;padding:5px 10px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-ptag:hover{border-color:var(--accent);color:var(--accent);}
.parent-gmail{display:flex;justify-content:flex-end;}
.btn-pgmail{background:transparent;border:1px solid #ea4335;color:#ea4335;font-family:'Space Mono',monospace;font-size:11px;padding:7px 14px;cursor:pointer;transition:all .15s;}
.btn-pgmail:hover{background:#ea4335;color:#fff;}

/* ── SUMMARY ── */
.summary-block{margin-top:26px;background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--accent);padding:22px 30px;}
.sum-stats{display:flex;gap:36px;flex-wrap:wrap;}
.stat .num{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--accent);line-height:1;}
.stat .lbl{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1.5px;margin-top:2px;}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:999;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--accent);padding:30px;width:440px;max-width:92vw;animation:up .2s ease;}
.modal h3{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent);margin-bottom:10px;}
.modal p{font-size:13px;color:#888;margin-bottom:16px;line-height:1.7;}
.rec-list{max-height:300px;overflow-y:auto;margin-bottom:14px;}
.rec-list::-webkit-scrollbar{width:3px;}
.rec-list::-webkit-scrollbar-thumb{background:var(--border);}
.rec-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border:1px solid var(--border);margin-bottom:7px;cursor:pointer;transition:all .15s;}
.rec-item:hover{border-color:var(--accent);}
.rec-item .ri-name{font-weight:700;font-size:14px;}
.rec-item .ri-meta{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px;}
.rec-del{background:transparent;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:2px 6px;line-height:1;}
.rec-del:hover{color:var(--red);}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;}

/* ── PRINT ── */
@media print{
  body{background:#fff!important;color:#000!important;}
  .site-header{background:#000!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .logo-main{color:var(--accent)!important;}
  .toolbar,.add-zone,.modal-bg{display:none!important;}
  .info-block,.summary-block{background:#f8f8f8!important;border-left:4px solid #c8bb00!important;}
  .block-title{color:#666!important;}
  .ifield input{color:#000!important;border-bottom-color:#ccc!important;}
  .student-grid{grid-template-columns:repeat(2,1fr)!important;}
  .s-card{border:1px solid #ddd!important;break-inside:avoid;background:#fff!important;}
  .c-head{background:#f0f0f0!important;}
  .c-name,.c-label{color:#000!important;}
  .c-del{display:none!important;}
  .tog label{background:#ccc!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .tog input:checked+label{background:#3ddc84!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .att-g input[value="O"]:checked+label{background:#3ddc84!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .att-g input[value="X"]:checked+label{background:#ff4d4d!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .att-g input[value="L"]:checked+label{background:#ff9500!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .memo-row textarea{background:#f9f9f9!important;color:#000!important;border-color:#ddd!important;}
  .stat .num{color:#a09000!important;}
}

@media(max-width:600px){
  .site-header{padding:0 18px;}
  .logo-main{font-size:38px;}
  .wrap{padding:0 14px;}
  .info-grid{grid-template-columns:1fr 1fr;}
  .span2{grid-column:span 1;}
  .student-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="site-header">
  <div class="logo-block">
    <div class="logo-main">LIT YOU UP</div>
    <div class="logo-sub">ACADEMY · LEARNING CHECK</div>
  </div>
  <div class="header-right">
    <div class="header-badge">STUDENT TRACKER</div>
  </div>
</header>

<div class="wrap">

  <!-- ── TOOLBAR: 저장/불러오기/내보내기 ── -->
  <div class="toolbar">
    <span class="toolbar-label">💾 RECORDS</span>
    <select id="recSelect" onchange="loadFromSelect()">
      <option value="">— 저장된 수업 기록 선택 —</option>
    </select>
    <button class="btn btn-g" onclick="saveRecord()">저장</button>
    <button class="btn btn-d" onclick="openModal()">목록 관리</button>
    <button class="btn btn-o" onclick="exportExcel()">엑셀 내보내기</button>
    <button class="btn btn-b" onclick="exportWord()">Word 저장</button>
    <button class="btn btn-d" onclick="window.print()">🖨 PDF 저장</button>
    <button class="btn btn-gmail" onclick="sendGmail()">✉ Gmail로 보내기</button>
    <span class="save-msg" id="saveMsg">✓ 저장됨</span>
  </div>

  <!-- ── ① CLASS INFO ── -->
  <div class="info-block">
    <div class="block-title">① CLASS INFO</div>
    <div class="info-grid">
      <div class="ifield">
        <label>날짜 DATE</label>
        <input type="date" id="f-date">
      </div>
      <div class="ifield">
        <label>강사명 TEACHER</label>
        <input type="text" id="f-teacher" placeholder="선생님 이름">
      </div>
      <div class="ifield">
        <label>과목 SUBJECT</label>
        <input type="text" id="f-subject" placeholder="예: 국어, 영어, 수학…">
      </div>
      <div class="ifield span2">
        <label>수업 내용 CLASS CONTENT</label>
        <input type="text" id="f-content" placeholder="예: 현대소설 — 소나기 / 비문학 독해 전략">
      </div>
    </div>
  </div>

  <!-- ── ② STUDENTS ── -->
  <div class="add-zone">
    <span class="zone-label">② STUDENTS</span>
    <input type="text" id="newName" placeholder="학생 이름 입력"
      onkeydown="if(event.key==='Enter') addStudent()">
    <button class="btn btn-y" onclick="addStudent()">+ 추가</button>
    <button class="btn btn-r" onclick="clearAll()">✕ 전체 삭제</button>
  </div>

  <!-- ── CARDS ── -->
  <div class="student-grid" id="sGrid">
    <div class="empty-note" id="emptyNote">— 학생을 추가하면 카드가 생성됩니다 —</div>
  </div>

  <!-- ── ③ SUMMARY ── -->
  <div class="summary-block">
    <div class="block-title">③ SUMMARY</div>
    <div class="sum-stats">
      <div class="stat"><div class="num" id="sTotal">0</div><div class="lbl">TOTAL</div></div>
      <div class="stat"><div class="num" id="sPresent">0</div><div class="lbl">출석</div></div>
      <div class="stat"><div class="num" id="sAbsent">0</div><div class="lbl">결석</div></div>
      <div class="stat"><div class="num" id="sLate">0</div><div class="lbl">지각</div></div>
      <div class="stat"><div class="num" id="sHW">0</div><div class="lbl">숙제완료</div></div>
      <div class="stat"><div class="num" id="sPre">0</div><div class="lbl">예습완료</div></div>
      <div class="stat"><div class="num" id="sRev">0</div><div class="lbl">복습완료</div></div>
      <div class="stat"><div class="num" id="sAtt">-</div><div class="lbl">평균태도</div></div>
    </div>
  </div>

</div><!-- /wrap -->

<!-- ── MODAL: 기록 관리 ── -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>📂 수업 기록 관리</h3>
    <p>저장된 수업 기록을 불러오거나 삭제할 수 있습니다.<br>불러오기 전 현재 내용을 먼저 저장해 주세요.</p>
    <div class="rec-list" id="recList"></div>
    <div class="modal-foot">
      <button class="btn btn-d" onclick="closeModal()">닫기</button>
    </div>
  </div>
</div>

<script>
/* ──────────────────────────────
   STATE
────────────────────────────── */
let students = [];
let uid = 0;
const SK = 'lyu_records';

// init date
document.getElementById('f-date').valueAsDate = new Date();
initCloud();

/* ──────────────────────────────
   ☁ CLOUD STORAGE (window.storage)
   PC / 폰 / 어느 브라우저에서든 동일한 데이터
────────────────────────────── */
async function initCloud() {
  setStatus('loading', '☁ 기록 불러오는 중…');
  try {
    const result = await window.storage.get(SK);
    const recs = result ? JSON.parse(result.value) : {};
    renderSelect(recs);
    setStatus('ok', '☁ 클라우드 연결됨');
  } catch(e) {
    renderSelect({});
    setStatus('ok', '☁ 새 기록 시작');
  }
}

async function getRecs() {
  try {
    const r = await window.storage.get(SK);
    return r ? JSON.parse(r.value) : {};
  } catch { return {}; }
}

async function setRecs(recs) {
  await window.storage.set(SK, JSON.stringify(recs));
}

function setStatus(state, msg) {
  const el = document.getElementById('saveMsg');
  el.textContent = msg;
  el.style.opacity = '1';
  el.style.color = state === 'saving' ? '#f5e642'
                 : state === 'loading' ? '#ff9500'
                 : '#3ddc84';
  if (state === 'ok') setTimeout(() => { el.style.opacity = '0'; }, 3000);
}

/* ──────────────────────────────
   ADD / REMOVE STUDENT
────────────────────────────── */
function addStudent(presetName, presetData) {
  const inp = document.getElementById('newName');
  const name = presetName || inp.value.trim();
  if (!name) return;

  const id = ++uid;
  students.push({ id, name });
  document.getElementById('emptyNote')?.remove();
  if (!presetName) inp.value = '';

  const num = students.length;
  const card = document.createElement('div');
  card.className = 's-card';
  card.id = 'card-' + id;
  card.style.animationDelay = ((num - 1) * 0.045) + 's';

  card.innerHTML = `
    <div class="c-head">
      <span class="c-num">${String(num).padStart(2,'0')}</span>
      <span class="c-name">${x(name)}</span>
      <button class="c-del" onclick="removeStu(${id})">✕</button>
    </div>
    <div class="c-body">
      <div class="c-row">
        <span class="c-label">출석 ATTENDANCE</span>
        <div class="att-g">
          <input type="radio" name="att${id}" id="aO${id}" value="O" checked onchange="sync()">
          <label for="aO${id}">출석</label>
          <input type="radio" name="att${id}" id="aX${id}" value="X" onchange="sync()">
          <label for="aX${id}">결석</label>
          <input type="radio" name="att${id}" id="aL${id}" value="L" onchange="sync()">
          <label for="aL${id}">지각</label>
        </div>
      </div>

예) 오늘 수업에서 받아쓰기를 매우 잘했습니다. 다음 수업까지 교재 32-35p 예습 부탁드립니다. 지난주보다 집중력이 많이 향상되었습니다."></textarea>

            <button class="btn-ptag" onclick="addTag(${id},'집중력 향상 📈')">집중력 향상 📈</button>
            <button class="btn-ptag" onclick="addTag(${id},'예습 필요 📚')">예습 필요 📚</button>
            <button class="btn-ptag" onclick="addTag(${id},'복습 필요 🔁')">복습 필요 🔁</button>
            <button class="btn-ptag" onclick="addTag(${id},'상담 요청 📞')">상담 요청 📞</button>
          </div>
          <div class="parent-gmail">
            <button class="btn-pgmail" onclick="sendParentGmail(${id},'${x(name)}')">✉ 이 학생만 Gmail 발송</button>
          </div>
        </div>
      </div>
    </div>`;

  document.getElementById('sGrid').appendChild(card);

  // restore saved data
  if (presetData) {
    const atEl = document.getElementById('a' + (presetData.att||'O') + id);
    if (atEl) atEl.checked = true;
    ['hw','pre','rev'].forEach(k => {
      if (presetData[k]) document.getElementById(k+id).checked = true;
    });
    if (presetData.star) {
      const sel = document.getElementById('s'+presetData.star+'x'+id);
      if (sel) { sel.checked = true; refreshStars(id); }
    }
    if (presetData.memo) document.getElementById('mem'+id).value = presetData.memo;
    if (presetData.pnote) {
      document.getElementById('pnote'+id).value = presetData.pnote;
      if (presetData.pnote) {
        document.getElementById('pb'+id).style.display = 'block';
        const btn = document.querySelector(`#card-${id} .parent-toggle`);
        if (btn) btn.textContent = '접기 ▴';
      }
    }
  }
  sync();
}

function removeStu(id) {
  students = students.filter(s => s.id !== id);
  document.getElementById('card-'+id)?.remove();
  if (!students.length) showEmpty();
  sync();
}

function clearAll() {
  if (!confirm('모든 학생 카드를 삭제할까요?')) return;
  students = []; uid = 0;
  document.getElementById('sGrid').innerHTML = '';
  showEmpty(); sync();
}

function showEmpty() {
  const e = document.createElement('div');
  e.className = 'empty-note'; e.id = 'emptyNote';
  e.textContent = '— 학생을 추가하면 카드가 생성됩니다 —';
  document.getElementById('sGrid').appendChild(e);
}

function refreshStars(id) {
  const g = document.getElementById('st'+id);
  if (!g) return;
  g.className = 'stars';
  for (let i=1;i<=5;i++) {
    if (document.getElementById('s'+i+'x'+id)?.checked) {
      g.classList.add('r'+i); break;
    }
  }
}

/* ──────────────────────────────
   SYNC SUMMARY
────────────────────────────── */
function sync() {
  let total=students.length, present=0, absent=0, late=0, hw=0, pre=0, rev=0, as=0, ac=0;
  students.forEach(({id}) => {
    const av = document.querySelector(`input[name="att${id}"]:checked`)?.value;
    if(av==='O') present++; else if(av==='X') absent++; else if(av==='L') late++;
    if(document.getElementById('hw'+id)?.checked) hw++;
    if(document.getElementById('pre'+id)?.checked) pre++;
    if(document.getElementById('rev'+id)?.checked) rev++;
    for(let i=1;i<=5;i++) if(document.getElementById('s'+i+'x'+id)?.checked){as+=i;ac++;}
  });
  set('sTotal',total); set('sPresent',present); set('sAbsent',absent); set('sLate',late);
  set('sHW',hw); set('sPre',pre); set('sRev',rev);
  set('sAtt', ac ? (as/ac).toFixed(1) : '-');
}
function set(id,v){document.getElementById(id).textContent=v;}

/* ──────────────────────────────
   COLLECT / APPLY DATA
────────────────────────────── */
function collectData() {
  return {
    date: document.getElementById('f-date').value,
    teacher: document.getElementById('f-teacher').value,
    subject: document.getElementById('f-subject').value,
    content: document.getElementById('f-content').value,
    students: students.map(({id,name}) => ({
      name,
      att: document.querySelector(`input[name="att${id}"]:checked`)?.value || 'O',
      hw: !!document.getElementById('hw'+id)?.checked,
      pre: !!document.getElementById('pre'+id)?.checked,
      rev: !!document.getElementById('rev'+id)?.checked,
      star: (()=>{ for(let i=1;i<=5;i++) if(document.getElementById('s'+i+'x'+id)?.checked) return i; return 0; })(),
      memo: document.getElementById('mem'+id)?.value || '',
      pnote: document.getElementById('pnote'+id)?.value || ''
    }))
  };
}

function applyData(d) {
  document.getElementById('f-date').value = d.date || '';
  document.getElementById('f-teacher').value = d.teacher || '';
  document.getElementById('f-subject').value = d.subject || '';
  document.getElementById('f-content').value = d.content || '';
  students = []; uid = 0;
  document.getElementById('sGrid').innerHTML = '';
  showEmpty();
  (d.students||[]).forEach(s => addStudent(s.name, s));
  sync();
}

/* ──────────────────────────────
   SAVE / LOAD (☁ Cloud)
────────────────────────────── */
async function saveRecord() {
  setStatus('saving', '☁ 저장 중…');
  const d = collectData();
  const recs = await getRecs();
  const key = Date.now().toString();
  const label = [d.date||'날짜없음', d.subject||'과목없음', d.teacher||'강사없음'].join(' · ');
  recs[key] = { label, ts: Date.now(), data: d };
  await setRecs(recs);
  renderSelect(recs);
  document.getElementById('recSelect').value = key;
  setStatus('ok', '✓ 클라우드에 저장됨');
}

function renderSelect(recs) {
  const sel = document.getElementById('recSelect');
  const cur = sel.value;
  sel.innerHTML = '<option value="">— 저장된 수업 기록 선택 —</option>';
  Object.keys(recs).sort((a,b)=>b-a).forEach(k => {
    const o = document.createElement('option');
    o.value = k; o.textContent = recs[k].label;
    sel.appendChild(o);
  });
  if (cur) sel.value = cur;
}

// kept for compatibility
function refreshSelect() { getRecs().then(renderSelect); }

async function loadFromSelect() {
  const key = document.getElementById('recSelect').value;
  if (!key) return;
  setStatus('loading', '☁ 불러오는 중…');
  const recs = await getRecs();
  if (recs[key]) { applyData(recs[key].data); setStatus('ok', '✓ 불러옴'); }
}

/* ──────────────────────────────
   MODAL
────────────────────────────── */
async function openModal() {
  const recs = await getRecs();
  const keys = Object.keys(recs).sort((a,b)=>b-a);
  const list = document.getElementById('recList');
  if (!keys.length) {
    list.innerHTML = '<p style="color:var(--muted);text-align:center;padding:24px;font-size:13px;">저장된 기록이 없습니다</p>';
  } else {
    list.innerHTML = '';
    keys.forEach(k => {
      const r = recs[k];
      const item = document.createElement('div');
      item.className = 'rec-item';
      item.innerHTML = `
        <div>
          <div class="ri-name">${x(r.label)}</div>
          <div class="ri-meta">학생 ${(r.data.students||[]).length}명 · ${new Date(r.ts).toLocaleString('ko-KR')}</div>
        </div>
        <button class="rec-del" onclick="deleteRec('${k}',event)">✕</button>`;
      item.onclick = e => {
        if (e.target.classList.contains('rec-del')) return;
        applyData(r.data);
        document.getElementById('recSelect').value = k;
        closeModal();
      };
      list.appendChild(item);
    });
  }
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

async function deleteRec(key, e) {
  e.stopPropagation();
  if (!confirm('이 기록을 삭제할까요?')) return;
  const recs = await getRecs();
  delete recs[key];
  await setRecs(recs);
  renderSelect(recs);
  openModal();
}

/* ──────────────────────────────
   학부모 전달 사항
────────────────────────────── */
function toggleParent(id) {
  const body = document.getElementById('pb'+id);
  const btn  = document.querySelector(`#card-${id} .parent-toggle`);
  const open = body.style.display === 'none';
  body.style.display = open ? 'block' : 'none';
  btn.textContent = open ? '접기 ▴' : '펼치기 ▾';
}

function addTag(id, tag) {
  const ta = document.getElementById('pnote'+id);
  if (!ta) return;
  ta.value = ta.value ? ta.value + ' ' + tag : tag;
  ta.focus();
}

function sendParentGmail(id, name) {
  const d = collectData();

    return document.getElementById('pnote' + students[i]?.id) &&
           students[i]?.id === id;
  }) || d.students.find(s => s.name === name);

  const pnote = document.getElementById('pnote'+id)?.value || '';
  if (!pnote.trim()) { alert('학부모 전달 사항을 먼저 입력해 주세요.'); return; }

  const subject = `[LIT YOU UP] ${name} 학생 학부모 전달 사항 (${d.date||''})`;
  let body = `안녕하세요, LIT YOU UP ACADEMY입니다.\n\n`;
  body += `${name} 학생의 ${d.date||''} 수업 관련 전달 사항입니다.\n`;
  body += `${'─'.repeat(40)}\n\n`;
  body += `${pnote}\n\n`;
  body += `${'─'.repeat(40)}\n`;
  body += `과목: ${d.subject||'-'}  |  강사: ${d.teacher||'-'}\n`;
  body += `\n감사합니다.\nLIT YOU UP ACADEMY`;

  window.open(
    'https://mail.google.com/mail/?view=cm&fs=1'
    + '&su=' + encodeURIComponent(subject)
    + '&body=' + encodeURIComponent(body),
    '_blank'
  );
}

────────────────────────────── */
function x(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
